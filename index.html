<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVIEWER</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #8b5cf6;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --text-muted: #cbd5e1;
            --success: #34d399;
            --error: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-width: 600px) {
            #app {
                max-width: 480px;
                height: 90vh;
                border-radius: 28px;
                background: rgba(15, 23, 42, 0.4);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                border: 1px solid var(--glass-border);
                backdrop-filter: blur(24px);
            }
        }

        header {
            flex-shrink: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 20;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .install-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-container {
            flex-shrink: 0;
            height: 4px;
            background: rgba(255,255,255,0.05);
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .screen.active {
            display: flex;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 140px;
        }

        .scroll-content::-webkit-scrollbar {
            display: none;
        }

        .center-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
            padding: 30px;
        }

        .logo-circle {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 24px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .question-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(12px);
        }

        .q-number {
            color: var(--secondary);
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: block;
        }

        .q-text {
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            gap: 12px;
            width: 100%;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 18px 20px;
            border-radius: 16px;
            color: rgba(255,255,255,0.9);
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
        }

        .option-btn strong {
            margin-right: 14px;
            color: var(--primary);
        }

        .option-btn.correct {
            background: rgba(52, 211, 153, 0.2);
            border-color: var(--success);
        }

        .option-btn.wrong {
            background: rgba(248, 113, 113, 0.2);
            border-color: var(--error);
            animation: shake 0.4s;
        }

        @keyframes shake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 24px;
            background: linear-gradient(to top, #0f172a 70%, transparent 100%);
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .primary-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px 0;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            max-width: 320px;
            cursor: pointer;
            pointer-events: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: #1e293b;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .modal h3 { margin-bottom: 15px; }
        .modal p { color: var(--text-muted); margin-bottom: 20px; }
        .modal-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <h1>PARA NIMO RA NI</h1>
            <button class="install-btn" onclick="toggleModal('install-modal', true)">Install</button>
        </header>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="start-screen" class="screen active">
            <div class="center-content">
                <div class="logo-circle">💻</div>
                <h2>REVIEW</h2>
                <p style="margin-bottom: 30px;">Ikaw ra dapat makakita ani</p>
                <button class="primary-btn" onclick="startQuiz()">Start Now</button>
            </div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="scroll-content">
                <div class="question-card">
                    <span class="q-number" id="q-number">Question 1</span>
                    <p class="q-text" id="q-text"></p>
                </div>
                <div class="options-grid" id="options-container"></div>
            </div>
            <div class="bottom-nav">
                <button id="next-btn" class="primary-btn hidden" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="center-content">
                <div class="logo-circle">🏆</div>
                <h1 id="final-score" style="font-size: 3rem; margin-bottom: 10px;">0%</h1>
                <p id="result-msg" style="margin-bottom: 30px;">Finish!</p>
                <button class="primary-btn" onclick="location.reload()">Restart</button>
            </div>
        </div>

        <div id="install-modal" class="modal-overlay">
            <div class="modal">
                <h3>Install App</h3>
                <p>Add this to your Home Screen for offline access.</p>
                <button class="modal-btn" onclick="toggleModal('install-modal', false)">Close</button>
            </div>
        </div>

        <div id="feedback-modal" class="modal-overlay">
            <div class="modal">
                <h3 style="color: var(--error);">Incorrect</h3>
                <p id="feedback-text"></p>
                <button class="modal-btn" onclick="toggleModal('feedback-modal', false)">Try Again</button>
            </div>
        </div>
    </div>

<script>
    const questions = [
        { q: "What is the spider-like interconnection of millions of pieces of information located on computers around the cyber space?", options: ["Browser", "E-commerce", "Internet of Things (IoT)", "World Wide Web"], correct: 3 },
        { q: "A non-profit organization wants to ensure that their website is accessible to visually impaired users. Which specific technology allows a computer to read the text on the screen aloud?", options: ["JPG", "HTML", "Screen Reader", "Graphic Interface"], correct: 2 },
        { q: "The Green-Netteam needs to see how many people visited their site from Manila versus Davao. Which specific tool provides this geographical data?", options: ["Bing", "Chrome", "Google Analytics", "Microsoft Word"], correct: 2 },
        { q: "An ICT student is creating a banner for a social media campaign. What is the standard unit used to measure the resolution of digital images?", options: ["Grams", "Pixels", "Meters", "Liters"], correct: 1 },
        { q: "The team is choosing a platform for their advocacy 'The Plastic-Free Ocean.' Which of the following is defined as a 'Social Media' platform?", options: ["Excel", "Facebook", "Photoshop", "PowerPoint"], correct: 1 },
        { q: "A developer is changing the appearance of a WordPress site without altering the content. What is the name of the file package that controls the layout and design?", options: ["Plugin", "Theme", "Dashboard", "Attachment"], correct: 1 },
        { q: "The Green-Net Initiative wants to start a petition that requires legal-grade proof of identity. What is the specific requirement for a digital document to be legally binding?", options: ["Music", "Borders", "Digital Signature", "High-resolution photos"], correct: 2 },
        { q: "A user clicks a button on a webpage and is immediately sent to a different site. What is the technical term for this clickable link?", options: ["Hyperlink", "Database", "Hard Drive", "Search Engine"], correct: 0 },
        { q: "The team is in the 'Planning' stage of their ICT project. What document lists the goals, audience, and budget of the project?", options: ["Letter", "Concept Paper", "Financial Report", "Attendance Sheet"], correct: 1 },
        { q: "The Green-Net site is receiving too many 'bot' comments that are irrelevant to the cause. What is the common term for these unwanted digital messages?", options: ["Spam", "Virus", "Cookie", "Malware"], correct: 0 },
        { q: "A volunteer is checking how many 'Unique Visitors' the site had in 24 hours. What does a 'Unique Visitor' represent?", options: ["One person", "Total clicks", "Shared links", "Page refreshes"], correct: 0 },
        { q: "The project manager wants to ensure the site is visible on Google Search. What is the acronym for the process of improving website visibility?", options: ["RAM", "SEO", "CPU", "HTTP"], correct: 1 },
        { q: "The group is uploading a logo that needs to have a transparent background. Which file extension supports transparency for web use?", options: ["DOC", "PNG", "MP3", "EXE"], correct: 1 },
        { q: "A student is looking at the web address https://www.cogonnationalhighschool.com. What does the 'S' in HTTPS stand for?", options: ["Secure", "Simple", "Service", "Standard"], correct: 0 },
        { q: "The team is using a CMS to build their website. What does 'CMS' stand for?", options: ["Computer Main System", "Center Management Site", "Creative Media Software", "Content Management System"], correct: 3 },
        { q: "The advocacy page has a button that says 'Sign the Petition Here.' What is the functional name for this specific button?", options: ["URL", "CTA", "DNS", "RAM"], correct: 1 },
        { q: "The Green-Net team is evaluating the 'Richness' of their website experience. Which combination creates a 'Rich' user experience?", options: ["Text and color", "Files and folders", "Page numbers and footers", "Interactivity and multimedia"], correct: 3 },
        { q: "What two tasks are essential during the maintenance of a social advocacy site?", options: ["Printing and filing", "Buying and selling", "Typing and scanning", "Updating and monitoring"], correct: 3 },
        { q: "Which of the following sets correctly identifies these pillars?", options: ["Phone, Radio, TV", "Money, Fame, Power", "People, Process, Tools", "Hardware, Software, Cords"], correct: 2 },
        { q: "The group needs to analyze their Facebook Insights report. Which two metrics are most important for measuring 'Engagement'?", options: ["Font and color", "Time and date", "Size and weight", "Likes and shares"], correct: 3 },
        { q: "What are the necessary components of an effective digital infographic?", options: ["Audio and video", "Links and codes", "Visuals and data", "Tables and chairs"], correct: 2 },
        { q: "The teacher asks for the different roles in an ICT project team. Which list correctly identifies common team roles?", options: ["Driver and Guard", "Doctor and Nurse", "Student and Parent", "Editor and Designer"], correct: 3 },
        { q: "The project is moving from 'Development' to 'Release.' What two things must be checked before making the site public?", options: ["Desk and Chair", "Paper and Pencil", "Mouse and Keyboard", "Broken links and Typos"], correct: 3 },
        { q: "Which tools are best for collecting user opinions and suggestions?", options: ["Maps and GPS", "Games and Apps", "Clocks and Timers", "Surveys and Comments"], correct: 3 },
        { q: "What are the defining characteristics of Web 2.0?", options: ["Faster speed and RAM", "More colors and fonts", "Bigger screens and pixels", "Participation and Sharing"], correct: 3 },
        { q: "What features indicate a website is protecting user information?", options: ["Nice logos and images", "Many pages and links", "Fast loading and music", "SSL certificates and Passwords"], correct: 3 },
        { q: "How does the design of the landing page directly affect the conversion rate?", options: ["Better colors", "More images", "High traffic", "A clear CTA"], correct: 3 },
        { q: "What is the relationship between 'Posting Frequency' and the 'Platform Algorithm'?", options: ["File size matters", "Inactive pages deleted", "Consistent activity improves visibility", "No impact"], correct: 2 },
        { q: "What is the primary difference in how Static vs Dynamic sites relate to the user?", options: ["Price", "Images", "Dynamic sites respond to user input", "Mobile support"], correct: 2 },
        { q: "80% of users are on mobile phones. How should this influence development?", options: ["Delete desktop version", "Prioritize mobile-responsive design", "Increase text size for PC", "Stop using HD images"], correct: 1 },
        { q: "How do Blogs and Social Media Platforms complement each other in a campaign?", options: ["Photos vs Text", "Blogs provide depth, Social Media reach", "Age demographics", "Update speed"], correct: 1 },
        { q: "What is the causal link between Alt-text and web accessibility?", options: ["Speed", "Colors", "Allows screen readers to describe images", "Hacking"], correct: 2 },
        { q: "Why is the 'Concept Paper' critical to the success of the Development phase?", options: ["Payment", "Government", "Blueprint for all technical decisions", "Replaces CMS"], correct: 2 },
        { q: "What is the most likely relationship between 'Media Files' and 'Page Speed'?", options: ["Videos faster", "ISP determined", "Plugins", "Unoptimized images increase loading time"], correct: 3 },
        { q: "How does the 'Evaluation' phase lead to a better 'User Experience'?", options: ["Costs", "Identifies friction points for designers", "User error", "Ignore comments"], correct: 1 },
        { q: "How does 'Crowdsourcing' change the traditional 'Top-Down' management style?", options: ["Easier work", "Empowers the community to co-create", "Budget removal", "Local only"], correct: 1 },
        { q: "What is the most sustainable way to 'Scale Up' this model to an entire province?", options: ["Photos", "Computers", "Facebook ads", "Create a replicable digital toolkit"], correct: 3 },
        { q: "Predict how AI might change the future of social advocacies.", options: ["No websites", "Force coding", "Highly personalized messaging", "Stop social media"], correct: 2 },
        { q: "Evaluate the role of ICT in modern activism.", options: ["Digital tools only", "Distraction", "ICT catalyst for offline mobilization", "Gathering emails"], correct: 2 },
        { q: "How should an ICT-based advocacy adapt to social media restrictions?", options: ["Stop project", "Flyers", "Fake names", "Build independent, hosted platforms"], correct: 3 },
        { q: "Which principle is most essential for ensuring long-term 'Social Impact'?", options: ["Influencers", "Ad spending", "Advanced Tech", "Aligning tools with human-centric goals"], correct: 3 }
    ];

    let currentIdx = 0;
    let score = 0;
    let locked = false;
    let penalty = false;

    const progressBar = document.getElementById('progress-bar');
    const qNumber = document.getElementById('q-number');
    const qText = document.getElementById('q-text');
    const optionsCont = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');

    function toggleModal(id, open) {
        document.getElementById(id).classList.toggle('open', open);
    }

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        loadQuestion();
    }

    function loadQuestion() {
        locked = false;
        penalty = false;
        nextBtn.classList.add('hidden');
        const q = questions[currentIdx];
        qNumber.textContent = `Question ${currentIdx + 1} / ${questions.length}`;
        qText.textContent = q.q;
        optionsCont.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${String.fromCharCode(65 + i)}</strong> ${opt}`;
            btn.onclick = () => check(i, btn);
            optionsCont.appendChild(btn);
        });
        progressBar.style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function check(idx, btn) {
        if (locked) return;
        const correct = questions[currentIdx].correct;
        if (idx === correct) {
            btn.classList.add('correct');
            locked = true;
            if (!penalty) score++;
            nextBtn.classList.remove('hidden');
        } else {
            btn.classList.add('wrong');
            penalty = true;
            document.getElementById('feedback-text').textContent = `Correct: ${questions[currentIdx].options[correct]}`;
            toggleModal('feedback-modal', true);
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) loadQuestion();
        else {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('final-score').textContent = `${pct}%`;
            progressBar.style.width = '100%';
        }
    }
</script>
</body>
</html>
